name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Publish backend (win-x64, self-contained, single-file)
        shell: bash
        run: |
          dotnet publish backend/src/MaddisLedger.Api/MaddisLedger.Api.csproj \
            -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
            -o backend/publish

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm install
          npm run build

      - name: Copy frontend build into backend wwwroot
        shell: bash
        run: |
          mkdir -p backend/publish/wwwroot
          cp -r frontend/dist/. backend/publish/wwwroot/

      - name: Set electron app version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          cd electron
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Install electron dependencies
        shell: bash
        run: |
          cd electron
          npm install

      - name: Build electron main process
        shell: bash
        run: |
          cd electron
          npm run build

      - name: Ensure GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # electron-builder uploads the installer and its .blockmap as separate parallel tasks, and
        # each independently checks "does the release exist yet?" before uploading — under a race,
        # both see "no" and both try to create it, and the second create fails with a 422 (already
        # exists), which is treated as fatal and aborts the whole publish step. Pre-creating the
        # release here removes that race. It must be created as a --draft: electron-builder treats
        # an existing *published* release as already finalized and silently skips uploading to it
        # entirely (confirmed on the v0.1.3 second attempt — zero assets attached).
        run: |
          gh release create "${GITHUB_REF_NAME}" --draft --title "${GITHUB_REF_NAME}" --generate-notes || echo "Release already exists, continuing"

      - name: Package and publish Electron app
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd electron
          npx electron-builder --win --x64 --publish always

      - name: Publish the GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # electron-builder.yml's releaseType: release only controls the draft/prerelease state for
        # a release electron-builder creates itself from scratch — it does NOT change the state of
        # a release that already existed (ours, pre-created above as a draft), confirmed on v0.1.3's
        # third attempt: assets uploaded correctly, but the release stayed a draft. Publish it
        # explicitly here now that all assets are attached.
        run: |
          gh release edit "${GITHUB_REF_NAME}" --draft=false
