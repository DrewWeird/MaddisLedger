<!DOCTYPE html>
<html>
<head>
    <title>Database Setup</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        form {
            width: 360px;
            background: #262626;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 24px;
        }
        h1 {
            font-size: 1.2em;
            margin: 0 0 4px;
        }
        p.subtitle {
            font-size: 0.85em;
            color: #9a9a9a;
            margin: 0 0 20px;
        }
        label {
            display: block;
            font-size: 0.8em;
            margin-bottom: 4px;
            margin-top: 12px;
            color: #bbb;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #fff;
            font-size: 0.9em;
        }
        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            border: none;
            background: #28c40d;
            color: #08260a;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            background: #555;
            color: #999;
            cursor: default;
        }
        #error {
            color: #ff8080;
            font-size: 0.8em;
            margin-top: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <form id="form">
        <h1>Connect to MySQL</h1>
        <p class="subtitle">Enter the details for the MySQL server Maddi's Sweet Temptations will use.</p>

        <label for="host">Host</label>
        <input id="host" value="localhost" required>

        <label for="port">Port</label>
        <input id="port" value="3306" required>

        <label for="database">Database Name</label>
        <input id="database" value="maddisledger" required>

        <label for="user">Username</label>
        <input id="user" value="maddisledger_app" required>

        <label for="password">Password</label>
        <input id="password" type="password" required>

        <button id="submit" type="submit">Connect</button>
        <div id="error"></div>
    </form>
    <script>
        const form = document.getElementById('form');
        const submitButton = document.getElementById('submit');
        const errorDiv = document.getElementById('error');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorDiv.textContent = '';
            submitButton.disabled = true;
            submitButton.textContent = 'Connecting...';

            const config = {
                host: document.getElementById('host').value.trim(),
                port: document.getElementById('port').value.trim(),
                database: document.getElementById('database').value.trim(),
                user: document.getElementById('user').value.trim(),
                password: document.getElementById('password').value,
            };

            const result = await window.dbSetupApi.submit(config);
            if (!result.success) {
                errorDiv.textContent = result.error || 'Something went wrong. Please try again.';
                submitButton.disabled = false;
                submitButton.textContent = 'Connect';
            }
            // On success the main process closes this window and proceeds automatically.
        });
    </script>
</body>
</html>
